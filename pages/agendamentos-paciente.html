<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
</head>

<body>
    <main id="app">
           <nav class="sidebar lg-show">
            <div class="hub md-hide">
                <div class="icon-menu">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <p>Centro de saúde</p>
            </div>
            <ul class="list-middle">
                <li class="item" data-attribute="home-paciente"><a href="home-paciente.html" class="btn list-menu"><i
                            class="fa-regular fa-house"></i>Home</a></li>
                            <li class="item" data-attribute="agendamento"><button class="btn list-menu"
                        onclick="navigate(this,'agendamentos-paciente')"><i
                            class="fa-regular fa-calendar"></i>Agenda<span class="badge md-hide">2</span></button>
                </li>
                <li class="item" data-attribute="telemidicina"><button class="btn list-menu"
                        onclick="navigate(this,'telemidicina-paciente')"> <i
                            class="fa-solid fa-video"></i>Teleconsulta</button></li>
                <li class="item" data-attribute="telemidicina"><button class="btn list-menu"
                        onclick="navigate(this,'perfil')"> <i class="fa-solid fa-user"></i></i>Perfil</button></li>

            </ul>
            <ul>
                <li><img src="https://randomuser.me/api/portraits/men/14.jpg" alt="imagem de uma pessoa"
                        class="img--radius">
                    <div class="infoPersona">
                        <p class="name">Nicolas P.</p>
                        <p class="nameTitle">Paciente</p>
                    </div>
                    <a href="index.html" class="exit list-menu"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
                </li>
            </ul>
        </nav>
        <section class="centralize">

            <h3 class="h3--exame">Minha Agenda</h3>

            <article class="tabs">
                <p class="tab active">Próximas</p>
                <p class="tab">Concluídas</p>
                <p class="tab">Canceladas</p>
            </article>

            <article class="card">
                📅 Março 2026
            </article>

            <article class="card cardAgendaPaciente">
                <p class="time">02 Mar 2026 • 15:00</p>
                <p class="doctor">Dr. João Silva</p>
                <p class="specialty">Cardiologia • Teleconsulta</p>
                <p class="status confirmed">🟢 Confirmada</p>
                <div class="flex__content">
                    <button class="btn btn-primary">Entrar na Consulta</button>
                    <button class="btn btn-start btn-primary">Reagendar</button>
                    <button class="btn btn-danger">Cancelar</button>
                </div>

            </article>

            <article class="card cardAgendaPaciente">
                <p class="time">10 Mar 2026 • 09:30</p>
                <p class="doctor">Dra. Mariana Alves</p>
                <p class="specialty">Dermatologia • Presencial</p>
                <p class="status confirmed">🟢 Confirmada</p>
                <div class="flex__content">
                    <button class="btn btn-start btn-primary">Reagendar</button>
                    <button class="btn btn-danger">Cancelar</button>
                </div>

            </article>
        </section>
    </main>
</body>

</html>
