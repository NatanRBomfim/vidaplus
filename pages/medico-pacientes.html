<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pacientes</title>
</head>

<body>

    <main id="app">
        <nav class="sidebar lg-show">
            <div class="hub md-hide">
                <div class="icon-menu">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <p>Centro de saúde</p>
            </div>
            <ul class="list-middle">
                <li class="item" data-attribute="home-medico"><a href="home-medico.html" class="btn list-menu"><i
                            class="fa-regular fa-house"></i>Home</a></li>
                <li class="item" data-attribute="medico-pacientes"><button class="btn list-menu"
                        onclick="navigate(this,'medico-pacientes')"><i class="fa-regular fa-user"></i>Pacientes</button>
                </li>
                <li class="item" data-attribute="agendamento"><button class="btn list-menu"
                        onclick="navigate(this,'agendamentos-usuario')"><i
                            class="fa-regular fa-calendar"></i>Agendamentos <span
                            class="badge md-hide">4</span></button></li>
                <li class="item" data-attribute="notificacao"><button class="btn list-menu"><i
                            class="fa-regular fa-bell"></i>Notificações <span class="badge md-hide">3</span></button>
                </li>
                <li class="item" data-attribute="telemidicina"><button class="btn list-menu"
                        onclick="navigate(this,'telemidicina-medico')"> <i
                            class="fa-solid fa-video"></i>Telemidicina</button></li>
            </ul>
            <ul>
                <li><img src="https://randomuser.me/api/portraits/men/4.jpg" alt="imagem de uma pessoa"
                        class="img--radius">
                    <div class="infoPersona">
                        <p class="name">Dr. Jordan</p>
                        <p class="nameTitle">Medico</p>
                    </div>
                    <a href="index.html" class="exit list-menu"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
                </li>
            </ul>
        </nav>
        <section class="centralize">
            <div class="pacientes">
                <h1 class="h1">Pacientes</h1>
                <button class="btn btn-primary btn-start btn-flex"
                    onclick="navigate(this,'medico-cadastro-paciente')"><i class="fa-solid fa-plus sm-hide"></i> Novo
                    Paciente</button>
            </div>
            <div class="pacientes">
                <div class="input-group input-width" tabindex="0">
                    <i class="fa-brands fa-sistrix"></i>
                    <input type="text" placeholder="Pesquisar" class="inputPsq"></input>
                </div>

                <button class="btn btn-primary">Editar</button>
            </div>
            <div class="container-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th><input type="checkbox"></th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Idade</th>
                            <th>Ultima Consulta</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
            <p class="limite">Exibindo 1 de <span></span> pacientes</p>
        </section>
    </main>
    <script src="../src/js/medico-pacientes.js"></script>
</body>

</html>
