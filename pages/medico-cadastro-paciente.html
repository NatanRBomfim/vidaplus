<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Novo paciente</title>
</head>

<body>
    <main id="app">
        <nav class="sidebar lg-show">
            <div class="hub md-hide">
                <div class="icon-menu">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <p>Centro de saúde</p>
            </div>
            <ul class="list-middle">
                <li class="item" data-attribute="home-medico"><a href="home-medico.html" class="btn list-menu"><i
                            class="fa-regular fa-house"></i>Home</a></li>
                  <li class="item" data-attribute="medico-pacientes"><button class="btn list-menu"
                        onclick="navigate(this,'medico-pacientes')"><i class="fa-regular fa-user"></i>Pacientes</button></li>
                <li class="item" data-attribute="agendamento"><button class="btn list-menu"
                        onclick="navigate(this,'agendamentos-usuario')"><i
                            class="fa-regular fa-calendar"></i>Agendamentos <span
                            class="badge md-hide">4</span></button></li>
                <li class="item" data-attribute="notificacao"><button class="btn list-menu"><i
                            class="fa-regular fa-bell"></i>Notificações <span class="badge md-hide">3</span></button>
                </li>
                <li class="item" data-attribute="telemidicina"><button class="btn list-menu"
                        onclick="navigate(this,'telemidicina-medico')"> <i
                            class="fa-solid fa-video"></i>Telemidicina</button></li>
            </ul>
            <ul>
                <li><img src="https://randomuser.me/api/portraits/men/4.jpg" alt="imagem de uma pessoa"
                        class="img--radius">
                    <div class="infoPersona">
                        <p class="name">Dr. Jordan</p>
                        <p class="nameTitle">Medico</p>
                    </div>
                    <a href="index.html" class="exit list-menu"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
                </li>
            </ul>
        </nav>
        <section class="centralize">
            <form action="#" class="form">
                <fieldset>
                    <legend class="hide">Cadastro novo paciente</legend>
                    <h1 class="h1 h1-paciente">Cadastrar Paciente</h1>

                    <div class="input--form">
                        <h3 class="h3">Dados Pessoais</h3>
                        <div class="input-group" tabindex="0">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Nome Completo" class="inputPsq">
                        </div>
                        <div class="input-group" tabindex="0">
                            <i class="fa-solid fa-address-card"></i>
                            <input type="text" placeholder="CPF" class="inputPsq">
                        </div>
                        <div class="input-group" tabindex="0">
                            <i class="fa-regular fa-calendar-days"></i>
                            <input type="date" placeholder="Data de Nascimento _/_/__" class="inputPsq">
                        </div>
                        <div class="input-group" tabindex="0">
                            <i class="fa-solid fa-venus-mars"></i>
                            <select name="tipoSang" id="typeSex" class="select">
                                <option value="default">Sexo</option>
                                <option value="masculino">Masculino</option>
                                <option value="feminino">Feminino</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group" tabindex="0">
                        <i class="fa-solid fa-droplet"></i>
                        <select name="tipoSang" id="typeBlood" class="select">
                            <option value="default">Tipo sanguineo</option>
                            <option value="aMais">A+</option>
                            <option value="aMenos">A-</option>
                            <option value="bMais">B+</option>
                            <option value="bMenos">B-</option>
                            <option value="abMais">AB+</option>
                            <option value="abMenos">AB-</option>
                            <option value="oMais">O+</option>
                            <option value="oMenos">O-</option>
                        </select>
                    </div>

                    <h3 class="h3">Convênio e Observações</h3>
                    <div class="input-group" tabindex="0">
                        <i class="fa-solid fa-credit-card"></i>
                        <input type="text" placeholder="Convênio" class="inputPsq">
                    </div>
                    <div class="observation">
                        <h4 class="h4">Observações Médicas</h4>
                        <textarea name="message" id="textArea"
                            placeholder="Digite Observações importantes..."></textarea>
                    </div>
                </fieldset>

                <div class="btn__links">
                    <button class="btn btn--cancel">Cancelar</button>
                    <button class="btn btn-primary btn-start">Cadastrar Paciente</button>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
