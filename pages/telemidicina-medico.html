<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telemedicina</title>
</head>

<body>

  <main id="app">
    <nav class="sidebar lg-show">
      <div class="hub md-hide">
        <div class="icon-menu">
          <i class="fa-solid fa-heart-pulse"></i>
        </div>
        <p>Centro de saúde</p>
      </div>
      <ul class="list-middle">
        <li class="item" data-attribute="home-medico"><a href="home-medico.html" class="btn list-menu"><i
              class="fa-regular fa-house"></i>Home</a></li>
        <li class="item" data-attribute="medico-pacientes"><button class="btn list-menu"
            onclick="navigate(this,'medico-pacientes')"><i class="fa-regular fa-user"></i>Pacientes</button></li>
        <li class="item" data-attribute="agendamento"><button class="btn list-menu"
            onclick="navigate(this,'agendamentos-usuario')"><i class="fa-regular fa-calendar"></i>Agendamentos <span
              class="badge md-hide">4</span></button></li>
        <li class="item" data-attribute="notificacao"><button class="btn list-menu"><i
              class="fa-regular fa-bell"></i>Notificações <span class="badge md-hide">3</span></button>
        </li>
        <li class="item" data-attribute="telemidicina"><button class="btn list-menu"
            onclick="navigate(this,'telemidicina-medico')"> <i class="fa-solid fa-video"></i>Telemidicina</button></li>
      </ul>
      <ul>
        <li><img src="https://randomuser.me/api/portraits/men/4.jpg" alt="imagem de uma pessoa" class="img--radius">
          <div class="infoPersona">
            <p class="name">Dr. Jordan</p>
            <p class="nameTitle">Medico</p>
          </div>
          <a href="index.html" class="exit list-menu"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </li>
      </ul>
    </nav>
    <section class="centralize">
      <h1 class="h1">Minhas Teleconsultas</h1>
      <h4 class="subtitle">Atendimentos online do dia</h4>


      <article class="card flex__content">
        <p>📅 Hoje • 02 Mar 2026</p>
        <p>Status: Todas</p>
      </article>

      <div class="gridContainer">
        <article class="card flex__content">
          <p class="time">14:00</p>
          <p class="patient">Ana Soares</p>
          <p class="status waiting">🟢 Aguardando paciente</p>
          <p class="doctor">Dr. João Silva • Cardiologia</p>
          <button class="btn btn-primary btn-start">Iniciar Atendimento</button>
        </article>

        <article class="card flex__content">
          <div class="time">15:00</div>
          <div class="patient">Matheus Santos</div>
          <div class="status online">🔵 Paciente na sala</div>
          <div class="doctor">Dr. João Silva • Cardiologia</div>
          <button class="btn btn-primary">Entrar na Sala</button>
        </article>
      </div>
    </section>
  </main>

</body>

</html>
